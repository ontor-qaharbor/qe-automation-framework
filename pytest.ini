[pytest]
# Pytest Configuration for Playwright + pytest-bdd BDD Framework

minversion = 7.0

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Plugin and output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    --html=reports/report.html
    --self-contained-html
    --junitxml=reports/junit.xml

# Test paths
testpaths =
    src/tests
    features

pythonpath =
    .

# BDD Configuration
gherkin_terminal_reporter = true
bdd_features_base_dir = features/

# Test timeout (seconds)
timeout = 300

# Custom markers
markers =
    smoke: Smoke/quick sanity tests
    regression: Full regression test suite
    negative: Negative test cases (error handling)
    critical: Critical business flow tests
    bdd: BDD/Gherkin feature-driven tests
    add_to_cart: Add to cart workflow tests
    login: Login-related tests
    positive: Positive scenario tests
    negative: Negative scenario tests
    integration: Integration tests

# Logging
log_cli = false
log_cli_level = INFO
log_file = test_results.log
log_file_level = DEBUG

# Test results
junit_family = xunit2
